name: Gerar URLs de Queda

permissions:
  contents: read

on:
  schedule:
    - cron: '0 0 * * *'  # Executa diariamente à meia-noite
  workflow_dispatch:

jobs:
  generate-urls:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Instalar dependências
        run: |
          python -m pip install supabase httpx
      - name: Gerar URLs
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -c "
import os
from supabase import create_client, Client

SUPABASE_URL = 'https://zyscwlksespdrpnrifzm.supabase.co'
SUPABASE_KEY = os.environ['SUPABASE_KEY']
supabase: Client = create_client(SUPABASE_URL, SUPABASE_KEY)

servicos = ['WhatsApp', 'iFood', 'Nubank', 'Mercado Livre', 'Instagram', 'Telegram']
anos = [2024, 2025, 2026]

for servico in servicos:
    for ano in anos:
        slug = f'{servico.lower().replace(' ', '-')}-caiu-{ano}'
        try:
            supabase.table('urls').insert({'slug': slug, 'servico': servico}).execute()
            print(f'Inserido: {slug}')
        except Exception as e:
            print(f'Erro ao inserir {slug}: {e}')
"
