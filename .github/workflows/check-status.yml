name: Pull Uptime Robot Status and Update Supabase

permissions:
  contents: read

on:
  schedule:
    - cron: '*/5 * * * *'  # Executa a cada 5 minutos
  workflow_dispatch:

jobs:
  check-status:
    runs-on: ubuntu-latest
    steps:
      - name: Instalar jq (para parse de JSON)
        run: |
          sudo apt-get update && sudo apt-get install -y jq

      - name: Obter status via Uptime Robot e atualizar Supabase
        env:
          UPTIMEROBOT_API_KEY: ${{ secrets.UPTIMEROBOT_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          echo "Chamando API do Uptime Robot..."
          RESPONSE=$(curl -s -X POST "https://api.uptimerobot.com/v2/getMonitors" \
            -H "Content-Type: application/json" \
            -d "{
              \"api_key\": \"${UPTIMEROBOT_API_KEY}\",
              \"format\": \"json\"
            }")
          
          echo "Resposta da API: $RESPONSE"
          echo "$RESPONSE" | jq .

          MONITORS=$(echo "$RESPONSE" | jq -c '.monitors[]')

          if [ -z "$MONITORS" ]; then
            echo "Nenhum monitor encontrado. Verifique a API key ou a resposta da API."
            exit 1
          fi

          for MONITOR in $MONITORS; do
            FRIENDLY_NAME=$(echo "$MONITOR" | jq -r '.friendly_name')
            STATUS_CODE=$(echo "$MONITOR" | jq -r '.status')

            if [ "$STATUS_CODE" -eq 2 ]; then
              NEW_STATUS=true
            else
              NEW_STATUS=false
            fi

            FRIENDLY_NAME_URL=$(echo "$FRIENDLY_NAME" | sed 's/ /%20/g')
            PATCH_URL="${SUPABASE_URL}/rest/v1/status_apps?nome=eq.${FRIENDLY_NAME_URL}"

            echo "Atualizando $FRIENDLY_NAME com status: $NEW_STATUS"
            curl -s -X PATCH "$PATCH_URL" \
              -H "apikey: $SUPABASE_SERVICE_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"status\": $NEW_STATUS, \"ultima_verificacao\": \"$(date -u +%FT%TZ)\"}"
            
            echo "Atualizado: $FRIENDLY_NAME => $NEW_STATUS (Código do status: $STATUS_CODE)"
          done
