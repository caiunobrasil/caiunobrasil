name: Monitorar Status dos Serviços BR

on:
  schedule:
    - cron: '*/5 * * * *'   # Executa a cada 5 minutos
  workflow_dispatch:         # Permite execução manual

jobs:
  check-status:
    runs-on: ubuntu-latest
    steps:
      - name: "Verificar status dos serviços"
        env:
          # URL do seu projeto Supabase (ex: https://abc123.supabase.co)
          SUPABASE_URL: "https://zyscwlksespdrpnrifzm.supabase.co"
          # A chave de serviço, armazenada como secret no GitHub
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          # Defina a lista de serviços (ajuste conforme necessário)
          declare -a SERVICES=("whatsapp" "ifood" "nubank" "instagram" "mercadolivre")
          
          for SERVICE in "${SERVICES[@]}"; do
            # Defina o endpoint correto para cada serviço
            if [ "$SERVICE" = "whatsapp" ]; then
              URL="https://web.whatsapp.com"
            elif [ "$SERVICE" = "ifood" ]; then
              URL="https://www.ifood.com.br"
            elif [ "$SERVICE" = "nubank" ]; then
              URL="https://nubank.com.br"
            elif [ "$SERVICE" = "instagram" ]; then
              URL="https://www.instagram.com"
            elif [ "$SERVICE" = "mercadolivre" ]; then
              URL="https://www.mercadolivre.com.br"
            else
              URL="https://www.$SERVICE.com.br"
            fi

            # Obtenha o código de status HTTP
            STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            if [ "$STATUS_CODE" -eq 200 ]; then
              STATUS="true"
            else
              STATUS="false"
            fi

            # Capitalize a primeira letra do nome do serviço para combinar com o valor na tabela (ex: WhatsApp, Ifood, Nubank)
            SERVICE_CAP="$(tr '[:lower:]' '[:upper:]' <<< ${SERVICE:0:1})${SERVICE:1}"

            # Atualize o registro no Supabase via PATCH
            curl -X PATCH "$SUPABASE_URL/rest/v1/status_apps?nome=eq.${SERVICE_CAP}" \
              -H "apikey: $SUPABASE_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"status\": $STATUS}" \
              --silent --show-error
            echo "Atualizado ${SERVICE_CAP}: $STATUS (HTTP code: $STATUS_CODE)"
          done

