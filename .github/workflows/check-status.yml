name: Pull Uptime Robot Status and Update Supabase

on:
  schedule:
    - cron: '*/5 * * * *'  # Executa a cada 5 minutos
  workflow_dispatch:

jobs:
  check-status:
    runs-on: ubuntu-latest
    steps:
      - name: Obter status via Uptime Robot e atualizar Supabase
        env:
          UPTIMEROBOT_API_KEY: ${{ secrets.UPTIMEROBOT_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          # Instala 'jq' para parse de JSON
          sudo apt-get update && sudo apt-get install -y jq

          # 1) Chama a API do Uptime Robot (getMonitors)
          RESPONSE=$(curl -s -X POST "https://api.uptimerobot.com/v2/getMonitors" \
            -H "Content-Type: application/json" \
            -d "{
              \"api_key\": \"${UPTIMEROBOT_API_KEY}\",
              \"format\": \"json\"
            }")

          # 2) Extrai a lista de monitores do JSON
          #    Estrutura: { "stat":"ok", "monitors":[ {...}, {...} ] }
          MONITORS=$(echo "$RESPONSE" | jq -c '.monitors[]')

          # 3) Loop nos monitores
          for MONITOR in $MONITORS; do
            FRIENDLY_NAME=$(echo "$MONITOR" | jq -r '.friendly_name')
            STATUS_CODE=$(echo "$MONITOR" | jq -r '.status')

            # No Uptime Robot:
            #   2 = Up
            #   8 = Seems Down
            #   9 = Down
            #   0 = Paused
            #   ...
            if [ "$STATUS_CODE" -eq 2 ]; then
              NEW_STATUS=true
            else
              NEW_STATUS=false
            fi

            # 4) Atualiza Supabase
            # Usa a service_role key para poder dar UPDATE
            # Observação: nome=eq.[FRIENDLY_NAME] deve bater com o 'nome' da tabela
            # Substituir espaços por %20
            PATCH_URL="${SUPABASE_URL}/rest/v1/status_apps?nome=eq.${FRIENDLY_NAME// /%20}"

            curl -s -X PATCH "$PATCH_URL" \
              -H "apikey: $SUPABASE_SERVICE_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"status\": $NEW_STATUS, \"ultima_verificacao\": \"$(date -u +%FT%TZ)\"}"

            echo "Atualizado: $FRIENDLY_NAME => $NEW_STATUS (status code: $STATUS_CODE)"
          done
