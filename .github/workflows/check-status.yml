name: Monitorar Status dos Serviços BR  
on:  
  schedule:  
    - cron: '*/5 * * * *'  # A cada 5 minutos, 24/7  
  workflow_dispatch:  

jobs:  
  check-status:  
    runs-on: ubuntu-latest  
    steps:  
      - name: Verificar status dos serviços  
        env:  
          SUPABASE_URL: 'https://SEU_SUPABASE_ID.supabase.co'  
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}  
        run: |  
          SERVICES=("whatsapp" "nubank" "ifood" "instagram" "mercadolivre")  
          for SERVICE in "${SERVICES[@]}"; do  
            # Verificar status HTTP  
            STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://$SERVICE.com.br")  
            [ "$STATUS_CODE" -eq 200 ] && STATUS="true" || STATUS="false"  

            # Atualizar Supabase  
            curl -X PATCH "$SUPABASE_URL/rest/v1/status_apps?nome=eq.${SERVICE^}" \  
              -H "apikey: $SUPABASE_SERVICE_KEY" \  
              -H "Content-Type: application/json" \  
              -d '{"status": '$STATUS'}'  
            
            echo "Atualizado $SERVICE: $STATUS ($STATUS_CODE)"  
          done  
