<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Caiu no Brasil? Monitoramento de Serviços</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      background: #f9f9f9; 
      padding: 20px; 
    }
    h1 { 
      text-align: center; 
    }
    table { 
      width: 100%; 
      border-collapse: collapse; 
      margin-top: 20px; 
    }
    th, td { 
      padding: 10px; 
      border: 1px solid #ccc; 
      text-align: center; 
    }
    th { 
      background: #e2e2e2; 
    }
    .ok { 
      color: green; 
      font-weight: bold; 
    }
    .erro { 
      color: red; 
      font-weight: bold; 
    }
  </style>
</head>
<body>
  <h1>Caiu no Brasil? Monitoramento de Serviços</h1>
  <table id="sitesTable">
    <thead>
      <tr>
        <th>#</th>
        <th>Nome do Site</th>
        <th>URL</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody>
      <!-- As linhas serão geradas aqui -->
    </tbody>
  </table>

  <script>
    // Lista dos 40 domínios conforme sua tabela
    const sites = [
      { name: "WhatsApp",         url: "https://www.whatsapp.com" },
      { name: "Instagram",         url: "https://www.instagram.com" },
      { name: "Facebook",          url: "https://www.facebook.com" },
      { name: "X/Twitter",         url: "https://twitter.com" },
      { name: "Telegram",          url: "https://telegram.org" },
      { name: "TikTok",            url: "https://www.tiktok.com" },
      { name: "Nubank",            url: "https://nubank.com.br" },
      { name: "Mercado Pago",      url: "https://www.mercadopago.com.br" },
      { name: "PicPay",            url: "https://www.picpay.com" },
      { name: "Banco do Brasil",   url: "https://www.bb.com.br" },
      { name: "Itaú",              url: "https://www.itau.com.br" },
      { name: "Bradesco",          url: "https://www.bradesco.com.br" },
      { name: "Caixa",             url: "https://www.caixa.gov.br" },
      { name: "Inter",             url: "https://www.bancointer.com.br" },
      { name: "C6 Bank",           url: "https://www.c6bank.com.br" },
      { name: "iFood",             url: "https://www.ifood.com.br" },
      { name: "Mercado Livre",     url: "https://www.mercadolivre.com.br" },
      { name: "Amazon",            url: "https://www.amazon.com.br" },
      { name: "Rappi",             url: "https://www.rappi.com.br" },
      { name: "Uber",              url: "https://www.uber.com/br/en/" },
      { name: "99",                url: "https://99app.com" },
      { name: "Netflix",           url: "https://www.netflix.com" },
      { name: "Spotify",           url: "https://www.spotify.com" },
      { name: "Globoplay",         url: "https://globoplay.globo.com" },
      { name: "YouTube",           url: "https://www.youtube.com" },
      { name: "Claro",             url: "https://www.claro.com.br" },
      { name: "Vivo",              url: "https://www.vivo.com.br" },
      { name: "TIM",               url: "https://www.tim.com.br" },
      { name: "Oi",                url: "https://www.oi.com.br" },
      { name: "Steam",             url: "https://store.steampowered.com" },
      { name: "Fortnite",          url: "https://www.epicgames.com/fortnite" },
      { name: "Roblox",            url: "https://www.roblox.com" },
      { name: "Discord",           url: "https://discord.com" },
      { name: "Zoom",              url: "https://zoom.us" },
      { name: "Teams",             url: "https://teams.microsoft.com" },
      { name: "Slack",             url: "https://slack.com" },
      { name: "Google",            url: "https://www.google.com" },
      { name: "Outlook",           url: "https://outlook.live.com" },
      { name: "ChatGPT",           url: "https://chat.openai.com" },
      { name: "LinkedIn",          url: "https://www.linkedin.com" }
    ];

    // Função para atualizar a tabela com os dados dos sites
    function updateTable() {
      const tbody = document.getElementById("sitesTable").querySelector("tbody");
      tbody.innerHTML = ""; // Limpa a tabela
      sites.forEach((site, index) => {
        const tr = document.createElement("tr");
        
        // Número do site
        const tdIndex = document.createElement("td");
        tdIndex.textContent = index + 1;
        tr.appendChild(tdIndex);
        
        // Nome do site
        const tdName = document.createElement("td");
        tdName.textContent = site.name;
        tr.appendChild(tdName);
        
        // URL do site
        const tdUrl = document.createElement("td");
        tdUrl.textContent = site.url;
        tr.appendChild(tdUrl);
        
        // Status do site
        const tdStatus = document.createElement("td");
        tdStatus.textContent = site.status || "Verificando...";
        if (site.status === "Funcionando") {
          tdStatus.classList.add("ok");
        } else if (site.status === "Fora do ar") {
          tdStatus.classList.add("erro");
        }
        tr.appendChild(tdStatus);
        
        tbody.appendChild(tr);
      });
    }

    // Função para verificar o status de um site usando fetch com 'no-cors'
    function checkSite(site) {
      // Utilizamos 'no-cors' para contornar restrições (não traz o conteúdo, mas indica se houve resposta)
      fetch(site.url, { mode: 'no-cors' })
        .then(() => {
          site.status = "Funcionando";
        })
        .catch(() => {
          site.status = "Fora do ar";
        })
        .finally(() => {
          updateTable();
        });
    }

    // Função para verificar todos os sites
    function checkAllSites() {
      sites.forEach(site => {
        checkSite(site);
      });
    }

    // Inicializa a tabela e inicia a verificação
    updateTable();
    checkAllSites();
  </script>
</body>
</html>
