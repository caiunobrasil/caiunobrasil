<script>
// Código ↓

// 1. Configure as credenciais (SUBSTITUA COM AS SUAS!)
 const SUPABASE_URL = 'https://zyscwlksespdrpnrifzm.supabase.co';

// 2. Crie o cliente do Supabase
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY); 

// 3. Busque os dados
async function fetchStatus() {
  const { data, error } = await supabase
    .from('status_apps')
    .select('*');
  
  const container = document.getElementById('status-container');
  container.innerHTML = data.map(app => `
    <div class="status">
      <h2>${app.nome}: ${app.status ? '🟢 ONLINE' : '🔴 OFFLINE'}</h2>
      <p>Atualizado em: ${new Date(app.ultima_verificacao).toLocaleString('pt-BR')}</p>
    </div>
  `).join('');
}
fetchStatus();
</script>
