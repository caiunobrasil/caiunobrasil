<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caiu no Brasil? | Status de Serviços</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }
        header {
            margin-bottom: 20px;
        }
        header h1 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 10px;
        }
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .status-card {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: left;
        }
        .status-card h2 {
            margin: 0 0 10px;
            font-size: 1.5em;
            color: #333;
        }
        .status-card p {
            margin: 5px 0;
        }
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
            vertical-align: middle;
        }
        .online {
            background: #2ecc71;
        }
        .offline {
            background: #e74c3c;
        }
        .last-check {
            font-size: 0.9em;
            color: #777;
        }
    </style>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
    <header>
        <h1>Caiu no Brasil? | Status de Serviços</h1>
        <p>Monitoramento em tempo real</p>
    </header>
    <div class="status-grid" id="status-container">
        <!-- Os cards serão gerados aqui via JavaScript -->
    </div>
    <script>
        const SUPABASE_URL = 'https://zyscwlksespdrpnrifzm.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5c2N3bGtzZXNwZHJwbnJpZnptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzk1NjY4NzQsImV4cCI6MjA1NTE0Mjg3NH0.6_oROXE_6Zve-HfQBiHbFpAVJKZNM_JCAl4Uqow9fXo'; // Replace with your actual key
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function fetchStatus() {
            try {
                const { data, error } = await supabase.from('status_apps').select('*');
                if (error) {
                    console.error(error);
                    return;
                }

                const container = document.getElementById('status-container');
                container.innerHTML = ''; // Clear existing content

                data.forEach(service => {
                    const card = document.createElement('div');
                    card.className = 'status-card';

                    const statusIndicator = document.createElement('div');
                    statusIndicator.className = `status-indicator ${service.status ? 'online' : 'offline'}`;
                    card.appendChild(statusIndicator);

                    const title = document.createElement('h2');
                    title.textContent = service.nome;
                    card.appendChild(title);

                    const status = document.createElement('p');
                    status.textContent = service.status ? 'Online' : 'Offline';
                    card.appendChild(status);

                    const lastCheck = document.createElement('p');
                    lastCheck.className = 'last-check';
                    lastCheck.textContent = `Última verificação: ${new Date(service.ultima_verificacao).toLocaleString()}`;
                    card.appendChild(lastCheck);

                    container.appendChild(card);
                });
            } catch (error) {
                console.error('Error fetching status:', error);
            }
        }

        // Call fetchStatus to load data on page load
        window.onload = fetchStatus;
    </script>
</body>
</html>
