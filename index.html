<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Service Status</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    h1 {
      text-align: center;
    }
    ul {
      list-style-type: none;
      padding: 0;
    }
    li {
      margin: 10px 0;
    }
    .up {
      color: green;
      font-weight: bold;
    }
    .down {
      color: red;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Status dos Serviços</h1>
  <ul id="status-list">
    <li>Carregando...</li>
  </ul>

  <script>
      // Loop through each monitor and display its status
      monitors.forEach(monitor => {
        const li = document.createElement('li');
        li.textContent = `${monitor.friendly_name}: `;
        const status = document.createElement('span');
        status.textContent = monitor.status === 2 ? 'Online' : 'Offline';
        status.className = monitor.status === 2 ? 'up' : 'down';
        li.appendChild(status);
        statusList.appendChild(li);
      });
    })
    .catch(error => {
      console.error('Erro ao buscar dados:', error);
      document.getElementById('status-list').innerHTML = '<li>Erro ao carregar status.</li>';
    });
  </script>
</body>
</html>
