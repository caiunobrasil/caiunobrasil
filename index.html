<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caiu no Brasil? | Status de Apps em Tempo Real</title>
    <meta name="description" content="Verifique se WhatsApp, iFood, Nubank e outros serviços estão online agora">
    <!-- Google AdSense (coloque após aprovação) -->
    <!-- <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-SEU_ID"></script> -->
</head>
<body>
    <h1>🟢🔴 Caiu no Brasil?</h1>
    <div id="status-container"></div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'SUA_URL_SUPABASE';
        const SUPABASE_KEY = 'SUA_KEY_SUPABASE';
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchStatus() {
            const { data, error } = await supabase
                .from('status_apps')
                .select('*');
            data.forEach(app => {
                document.getElementById('status-container').innerHTML += `
                    <div class="status-item">
                        <h2>${app.nome}: ${app.status ? '🟢 ONLINE' : '🔴 OFFLINE'}</h2>
                        <p>Última verificação: ${new Date(app.ultima_verificacao).toLocaleString()}</p>
                    </div>
                `;
            });
        }
        fetchStatus();
    </script>
</body>
</html>
